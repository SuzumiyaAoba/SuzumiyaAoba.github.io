<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="100%" role="img" aria-labelledby="ctor-title ctor-desc" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <title id="ctor-title">new とコンストラクタの流れ</title>
  <desc id="ctor-desc">new Person("佐藤", 25) を実行すると、①メモリにオブジェクトの領域が確保され（フィールドは初期値）、②コンストラクタが実行されてフィールドに初期値が入り、③初期化済みのオブジェクトが変数に入る、という順で進む。</desc>

  <!-- 呼び出し -->
  <rect x="250" y="24" width="220" height="46" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="360" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">new Person("佐藤", 25)</text>

  <line x1="360" y1="70" x2="360" y2="96" stroke="#f97316" stroke-width="2" marker-end="url(#ct-arrow)"/>

  <!-- ① 領域確保 -->
  <rect x="120" y="98" width="480" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="122" font-size="14" font-weight="bold" fill="#475569">&#9312; メモリに領域を確保</text>
  <text x="140" y="143" font-size="12" fill="#64748b">フィールドはまだ初期値（name=null, age=0）</text>

  <line x1="360" y1="154" x2="360" y2="178" stroke="#94a3b8" stroke-width="2" marker-end="url(#ct-arrow2)"/>

  <!-- ② コンストラクタ実行 -->
  <rect x="120" y="180" width="480" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="204" font-size="14" font-weight="bold" fill="#1e3a8a">&#9313; コンストラクタが実行される</text>
  <text x="140" y="226" font-size="12" fill="#1e3a8a">this.name = "佐藤";　this.age = 25;</text>

  <line x1="360" y1="238" x2="360" y2="262" stroke="#3b82f6" stroke-width="2" marker-end="url(#ct-arrow3)"/>

  <!-- ③ 初期化済みオブジェクトを返す -->
  <rect x="120" y="264" width="480" height="48" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="293" font-size="14" font-weight="bold" fill="#166534">&#9314; 初期化済みオブジェクトを返す → Person p に入る</text>

  <defs>
    <marker id="ct-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f97316"/></marker>
    <marker id="ct-arrow2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ct-arrow3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3b82f6"/></marker>
  </defs>
</svg>
