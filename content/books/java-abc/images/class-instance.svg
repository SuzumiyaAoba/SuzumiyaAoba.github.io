<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="100%" role="img" aria-labelledby="ci-title ci-desc" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <title id="ci-title">クラスとオブジェクトの関係</title>
  <desc id="ci-desc">1つの焼き型（クラス Taiyaki）から、あん入り・クリーム入り・チョコ入りといった複数のたい焼き（オブジェクト）が new で作られる。型は設計図、たい焼きは実体。</desc>

  <!-- 左: クラス（焼き型＝設計図） -->
  <rect x="30" y="80" width="220" height="170" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="112" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a8a">クラス Taiyaki</text>
  <text x="140" y="136" text-anchor="middle" font-size="13" fill="#64748b">＝ 焼き型（設計図）</text>
  <!-- 型のイラスト的表現 -->
  <ellipse cx="140" cy="190" rx="80" ry="40" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <ellipse cx="140" cy="190" rx="58" ry="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="140" y="195" text-anchor="middle" font-size="12" fill="#64748b">具を入れる場所</text>

  <!-- 矢印 + new -->
  <line x1="262" y1="165" x2="338" y2="165" stroke="#f97316" stroke-width="2.5" marker-end="url(#ci-arrow)"/>
  <text x="300" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#f97316">new</text>
  <text x="300" y="188" text-anchor="middle" font-size="11" fill="#64748b">何個でも作れる</text>

  <!-- 右: オブジェクト3つ（たい焼き＝実体） -->
  <g>
    <rect x="360" y="60" width="370" height="64" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="392" y="88" font-size="22">&#127844;</text>
    <text x="430" y="88" font-size="15" font-weight="bold" fill="#166534">たい焼き①</text>
    <text x="430" y="108" font-size="12" fill="#64748b">具：あん</text>
  </g>
  <g>
    <rect x="360" y="138" width="370" height="64" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="392" y="166" font-size="22">&#127844;</text>
    <text x="430" y="166" font-size="15" font-weight="bold" fill="#166534">たい焼き②</text>
    <text x="430" y="186" font-size="12" fill="#64748b">具：クリーム</text>
  </g>
  <g>
    <rect x="360" y="216" width="370" height="64" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="392" y="244" font-size="22">&#127844;</text>
    <text x="430" y="244" font-size="15" font-weight="bold" fill="#166534">たい焼き③</text>
    <text x="430" y="264" font-size="12" fill="#64748b">具：チョコ</text>
  </g>
  <text x="545" y="300" text-anchor="middle" font-size="13" fill="#64748b">オブジェクト（実体）＝ 形は同じ、中身は別々</text>

  <!-- キャプション -->
  <text x="380" y="328" text-anchor="middle" font-size="13" fill="#475569">1つのクラス（設計図）から、複数のオブジェクト（実体）を作れる</text>

  <defs>
    <marker id="ci-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
  </defs>
</svg>
