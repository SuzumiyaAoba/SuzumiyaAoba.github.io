<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" width="100%" height="auto" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif" role="img" aria-labelledby="ipo-title ipo-desc">
  <title id="ipo-title">入力・処理・出力の流れ</title>
  <desc id="ipo-desc">プログラムは、入力を受け取り、処理を行い、出力を返すという流れで動く。電卓で「1 + 2」を計算して「3」を表示する例。</desc>
  <defs>
    <marker id="ipo-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 入力 -->
  <rect x="20" y="40" width="190" height="86" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="115" y="74" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">入力</text>
  <text x="115" y="104" text-anchor="middle" font-size="16" fill="#334155">1 + 2</text>

  <!-- 処理 -->
  <rect x="285" y="40" width="190" height="86" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="74" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">処理</text>
  <text x="380" y="104" text-anchor="middle" font-size="16" fill="#334155">1 と 2 を足す</text>

  <!-- 出力 -->
  <rect x="550" y="40" width="190" height="86" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="645" y="74" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">出力</text>
  <text x="645" y="104" text-anchor="middle" font-size="16" fill="#334155">3 を表示する</text>

  <!-- 矢印 -->
  <line x1="215" y1="83" x2="280" y2="83" stroke="#64748b" stroke-width="3" marker-end="url(#ipo-arrow)"/>
  <line x1="480" y1="83" x2="545" y2="83" stroke="#64748b" stroke-width="3" marker-end="url(#ipo-arrow)"/>

  <!-- キャプション -->
  <text x="380" y="180" text-anchor="middle" font-size="15" fill="#64748b">例：電卓で「1 + 2」を計算して「3」を表示する</text>
</svg>
