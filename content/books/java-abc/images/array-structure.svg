<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" width="100%" height="auto" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif" role="img" aria-labelledby="arr-title arr-desc">
  <title id="arr-title">配列の構造</title>
  <desc id="arr-desc">配列 scores は、同じ型（int）の値が5個ならんでいる。各箱の中身が要素で、80・95・70・60・100。各箱の下の番号がインデックスで、0・1・2・3・4。インデックスは0から始まる。</desc>

  <text x="290" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">配列 scores ― 同じ型（int）の値が 5 個ならんでいる</text>

  <!-- 箱と値 -->
  <rect x="44" y="44" width="88" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="88" y="82" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">80</text>
  <rect x="144" y="44" width="88" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="188" y="82" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">95</text>
  <rect x="244" y="44" width="88" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="288" y="82" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">70</text>
  <rect x="344" y="44" width="88" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="388" y="82" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">60</text>
  <rect x="444" y="44" width="88" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="488" y="82" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">100</text>

  <!-- インデックス -->
  <text x="88" y="128" text-anchor="middle" font-size="16" fill="#64748b">0</text>
  <text x="188" y="128" text-anchor="middle" font-size="16" fill="#64748b">1</text>
  <text x="288" y="128" text-anchor="middle" font-size="16" fill="#64748b">2</text>
  <text x="388" y="128" text-anchor="middle" font-size="16" fill="#64748b">3</text>
  <text x="488" y="128" text-anchor="middle" font-size="16" fill="#64748b">4</text>

  <text x="290" y="158" text-anchor="middle" font-size="13" fill="#64748b">↑ インデックス（0 から始まる番号。最後は「個数 − 1」＝ 4）</text>

  <!-- キャプション -->
  <text x="290" y="186" text-anchor="middle" font-size="14" fill="#64748b">箱の中身が「要素」、下の番号が「インデックス」。scores[0] は 80、scores[4] は 100</text>
</svg>
