<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="100%" height="auto" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif" role="img" aria-labelledby="wora-title wora-desc">
  <title id="wora-title">一度書けば、どこでも動く</title>
  <desc id="wora-desc">同じ Hello.class（バイトコード）を、Windows・Mac・Linux それぞれの JVM が受け取り、その環境の機械語に変換して実行する。</desc>
  <defs>
    <marker id="wora-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- バイトコード（共通） -->
  <rect x="300" y="20" width="220" height="64" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="410" y="46" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Hello.class</text>
  <text x="410" y="68" text-anchor="middle" font-size="13" fill="#475569">共通のバイトコード</text>

  <!-- 分岐の矢印 -->
  <line x1="410" y1="84" x2="130" y2="150" stroke="#64748b" stroke-width="2.5" marker-end="url(#wora-arrow)"/>
  <line x1="410" y1="84" x2="410" y2="150" stroke="#64748b" stroke-width="2.5" marker-end="url(#wora-arrow)"/>
  <line x1="410" y1="84" x2="690" y2="150" stroke="#64748b" stroke-width="2.5" marker-end="url(#wora-arrow)"/>

  <!-- Windows JVM -->
  <rect x="20" y="155" width="210" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="182" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Windows 用 JVM</text>
  <text x="125" y="205" text-anchor="middle" font-size="12" fill="#475569">Windows の機械語へ変換</text>

  <!-- Mac JVM -->
  <rect x="305" y="155" width="210" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="182" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Mac 用 JVM</text>
  <text x="410" y="205" text-anchor="middle" font-size="12" fill="#475569">Mac の機械語へ変換</text>

  <!-- Linux JVM -->
  <rect x="590" y="155" width="210" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="695" y="182" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Linux 用 JVM</text>
  <text x="695" y="205" text-anchor="middle" font-size="12" fill="#475569">Linux の機械語へ変換</text>

  <!-- 実行結果 -->
  <text x="125" y="258" text-anchor="middle" font-size="14" fill="#16a34a">Windows で動く</text>
  <text x="410" y="258" text-anchor="middle" font-size="14" fill="#16a34a">Mac で動く</text>
  <text x="695" y="258" text-anchor="middle" font-size="14" fill="#16a34a">Linux で動く</text>

  <text x="410" y="298" text-anchor="middle" font-size="14" fill="#64748b">1 つのバイトコードを、各環境の JVM がそれぞれの機械語に通訳する</text>
</svg>
