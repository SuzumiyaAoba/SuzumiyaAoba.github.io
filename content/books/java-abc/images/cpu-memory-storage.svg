<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif" role="img" aria-labelledby="cms-title cms-desc">
  <title id="cms-title">CPU・メモリ・ストレージの関係</title>
  <desc id="cms-desc">ストレージ（冷蔵庫・倉庫）からメモリ（調理台）へデータを読み込み、CPU（料理人）がそれを処理する。メモリは高速だが電源を切ると消え、ストレージは大容量で電源を切っても消えない。</desc>
  <defs>
    <marker id="cms-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ストレージ -->
  <rect x="15" y="45" width="220" height="125" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="125" y="80" text-anchor="middle" font-size="21" font-weight="bold" fill="#1e293b">ストレージ</text>
  <text x="125" y="108" text-anchor="middle" font-size="15" fill="#475569">冷蔵庫・倉庫（保管庫）</text>
  <text x="125" y="135" text-anchor="middle" font-size="14" fill="#475569">大容量／低速</text>
  <text x="125" y="155" text-anchor="middle" font-size="14" fill="#475569">電源を切っても消えない</text>

  <!-- メモリ -->
  <rect x="290" y="45" width="220" height="125" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-size="21" font-weight="bold" fill="#1e293b">メモリ</text>
  <text x="400" y="108" text-anchor="middle" font-size="15" fill="#475569">調理台（作業場所）</text>
  <text x="400" y="135" text-anchor="middle" font-size="14" fill="#475569">高速／容量は小さめ</text>
  <text x="400" y="155" text-anchor="middle" font-size="14" fill="#475569">電源を切ると消える</text>

  <!-- CPU -->
  <rect x="565" y="45" width="220" height="125" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="675" y="80" text-anchor="middle" font-size="21" font-weight="bold" fill="#1e293b">CPU</text>
  <text x="675" y="108" text-anchor="middle" font-size="15" fill="#475569">料理人（頭脳）</text>
  <text x="675" y="135" text-anchor="middle" font-size="14" fill="#475569">命令を 1 つずつ</text>
  <text x="675" y="155" text-anchor="middle" font-size="14" fill="#475569">高速に実行する</text>

  <!-- 双方向の矢印 -->
  <line x1="240" y1="107" x2="285" y2="107" stroke="#64748b" stroke-width="3" marker-start="url(#cms-arrow)" marker-end="url(#cms-arrow)"/>
  <line x1="515" y1="107" x2="560" y2="107" stroke="#64748b" stroke-width="3" marker-start="url(#cms-arrow)" marker-end="url(#cms-arrow)"/>

  <!-- 流れの説明 -->
  <text x="400" y="210" text-anchor="middle" font-size="15" fill="#64748b">データはストレージから読み込み、メモリ上で CPU が処理する</text>
</svg>
